services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql://postgres:1234@host.docker.internal:5432/jobhelper
      NEXTAUTH_URL: http://localhost:3000
      NODE_OPTIONS: "--max-old-space-size=4096"
      LINKEDIN_SESSION_COOKIE: ${LINKEDIN_SESSION_COOKIE}
      LINKEDIN_JSESSIONID: ${LINKEDIN_JSESSIONID}
      LINKEDIN_API_URL: ${LINKEDIN_API_URL:-}
